<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Администрирование витрины магазина. Список товаров</title>
</head>
<body>
<h2>Список товаров</h2>
<form th:action="@{/admin-items/add}" method="get">
  <button type="submit" class="btn btn-success">Добавить</button>
</form>
<br>
<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>Название</th>
    <th>Описание</th>
    <th>Изображение</th>
    <th>Цена</th>
    <th>Действия</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="item : ${items}">
    <td th:text="${item.id}"></td>
    <td th:text="${item.title}"></td>
    <td th:text="${item.description}"></td>
    <td th:text="${item.imgPath}"></td>
    <td th:text="${item.price}"></td>
    <td>
      <form th:action="@{/admin-items/edit/{id}(id=${item.id})}" method="get" style="display:inline;">
        <button type="submit" class="btn btn-primary">Редактировать</button>
      </form>
      <form th:action="@{/admin-items/delete/{id}(id=${item.id})}" method="get" style="display:inline;">
        <button type="submit" class="btn btn-danger" onclick="return confirm('Вы уверены?');">Удалить</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
