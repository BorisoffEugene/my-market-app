services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8082:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/health/ready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    container_name: db
    image: postgres:17.5
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"

  app-main:
    container_name: my-market-app-main
    build:
      context: .
      dockerfile: main/Dockerfile
    ports:
      - "8080:8080"
    image: my-market-app-main
    restart: on-failure
    depends_on:
      - keycloak
      - db
      - redis

  app-payservice:
    container_name: my-market-app-payservice
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "8081:8081"
    image: my-market-app-payservice
    restart: on-failure

volumes:
  db-data: